# Optional: run ignored integration tests when GGUF files are available (e.g. self-hosted runner with cache).
name: Model integration

on:
  workflow_dispatch:

jobs:
  ignored-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: Hint
        run: |
          echo "Set repository secret or variable QWEN3_TTS_MODEL_DIR on a runner that has GGUF files,"
          echo "or replace this job with a self-hosted runner that mounts models."
      # Example when models are present on the runner:
      # - name: test
      #   env:
      #     QWEN3_TTS_MODEL_DIR: ${{ vars.QWEN3_TTS_MODEL_DIR }}
      #   run: cargo test -p qwen3-tts -- --ignored
