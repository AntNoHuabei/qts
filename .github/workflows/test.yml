name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SOURCE_MODEL_ID: Qwen/Qwen3-TTS-12Hz-0.6B-Base

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ${{ matrix.os }}
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Linux build prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libjack-jackd2-dev \
            libjack-jackd2-0 \
            libpipewire-0.3-dev \
            glslc \
            pkg-config

      - name: Install macOS build prerequisites
        if: runner.os == 'macOS'
        run: brew install shaderc

      - name: Install Vulkan SDK
        id: install_vulkan_sdk
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: latest
      - name: Cargo Fmt
        run: cargo fmt --all -- --check
      - name: Cargo Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Sync Python environment
        run: uv sync --locked
      - name: Generate smoke-test model artifacts
        shell: bash
        run: |
          cargo xtask hf-release \
            --model "$SOURCE_MODEL_ID" \
            --main-type f16 \
            --artifacts-dir models/qwen3-tts-ci \
            --out-dir models/qwen3-tts-ci
      - name: Cargo Test
        run: cargo test --workspace
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats
