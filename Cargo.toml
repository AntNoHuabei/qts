[workspace]
resolver = "2"
members = [
    "crates/ggml-sys",
    "crates/ggml",
    "crates/qwen3-tts", "xtask", "crates/qwen3-tts-cli",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.88"
license = "Apache-2.0"
repository = "https://github.com/yet-another-ai/qts"

[workspace.dependencies]
ggml-sys = { path = "crates/ggml-sys" }
ggml = { path = "crates/ggml" }
thiserror = "2"
rand = "0.9"

[profile.release]
debug = "line-tables-only"
lto = true
codegen-units = 1
panic = "abort"
